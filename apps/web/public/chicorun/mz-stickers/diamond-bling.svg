<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g transform-origin="center">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
    <polygon points="50,10 90,35 75,90 25,90 10,35" fill="#fbcfe8" fill-opacity="0.8" stroke="#ec4899" stroke-width="2">
       <animate attributeName="fill" values="#fbcfe8;#d8b4fe;#fbcfe8" dur="4s" repeatCount="indefinite" />
    </polygon>
    <path d="M50 10 L75 90 M50 10 L25 90 M10 35 L90 35" stroke="white" stroke-width="1.5" stroke-opacity="0.6" />
  </g>
  <g opacity="0">
    <circle cx="20" cy="20" r="2" fill="white" />
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0s" />
  </g>
  <g opacity="0">
    <circle cx="80" cy="80" r="2" fill="white" />
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.5s" />
  </g>
</svg>
