<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 50 Q50 10 90 50 Q50 90 10 50" fill="none" stroke="#6366f1" stroke-width="4" />
  <g transform-origin="50 50">
    <animateTransform attributeName="transform" type="translate" values="0,0; 5,0; -5,0; 0,0" dur="4s" repeatCount="indefinite" />
    <circle cx="50" cy="50" r="10" fill="#818cf8" />
    <circle cx="50" cy="50" r="4" fill="black" />
  </g>
  <g opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="0.2s" begin="2s" repeatCount="indefinite" repeatDur="0.2s" />
    <path d="M10 50 Q50 10 90 50" fill="#1e1b4b" />
  </g>
</svg>
