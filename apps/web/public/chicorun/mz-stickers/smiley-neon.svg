<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="#facc15" stroke="#000" stroke-width="3" />
  <g id="eyes">
    <circle cx="35" cy="40" r="5" fill="#000" />
    <circle cx="65" cy="40" r="5" fill="#000" />
    <animateTransform attributeName="transform" type="translate" values="0,0; 2,0; -2,0; 0,0" dur="3s" repeatCount="indefinite" />
  </g>
  <path d="M30 65 Q50 85 70 65" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round">
    <animate attributeName="d" values="M30 65 Q50 85 70 65; M30 70 Q50 75 70 70; M30 65 Q50 85 70 65" dur="2s" repeatCount="indefinite" />
  </path>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite" />
  </circle>
</svg>
